name: "Terraform Infrastructure"

on:
  # workflow_dispatch:
   push:
     branches:
       - main
   pull_request:

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    defaults:
      run:
        working-directory: ./
    
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_wif_pool_id: ${{ secrets.WIF_POOL_ID }}
      TF_VAR_mongo_admin_pass: ${{ secrets.MONGO_ADMIN_PASS }}
      TF_VAR_mongo_app_pass: ${{ secrets.MONGO_APP_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # TCP: Use secrets for WIF Provider and Service Account
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.1.7"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ secrets.TFSTATE_GCS_BUCKET }}"

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false